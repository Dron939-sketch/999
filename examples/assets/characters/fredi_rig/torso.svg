<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 224" width="190" height="224">
  <defs>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33333c"/>
      <stop offset="42%" stop-color="#191920"/>
      <stop offset="100%" stop-color="#0a0a10"/>
    </linearGradient>
    <linearGradient id="coatSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="50%" stop-color="#26262e"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>
    <linearGradient id="satin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#565660"/>
      <stop offset="100%" stop-color="#22222b"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f1ea"/>
      <stop offset="100%" stop-color="#d7d2c6"/>
    </linearGradient>
  </defs>

  <!-- Jacket silhouette (shoulders → waist), covers the hips -->
  <path d="M18 24
           Q95 6 172 24
           L165 66
           Q160 122 154 154
           Q95 164 36 154
           Q30 122 25 66 Z"
        fill="url(#coat)" stroke="#050508" stroke-width="1.6"/>

  <!-- Padded shoulder seams -->
  <path d="M22 30 Q40 20 60 26" fill="none" stroke="#000000" stroke-width="1.2" opacity="0.5"/>
  <path d="M168 30 Q150 20 130 26" fill="none" stroke="#000000" stroke-width="1.2" opacity="0.5"/>

  <!-- White shirt front with studs -->
  <path d="M76 18 L114 18 L107 122 L83 122 Z" fill="url(#shirt)" stroke="#b7b0a0" stroke-width="1"/>
  <circle cx="95" cy="52" r="2.4" fill="#26262c"/>
  <circle cx="95" cy="74" r="2.4" fill="#26262c"/>
  <circle cx="95" cy="96" r="2.4" fill="#26262c"/>

  <!-- Satin peaked lapels framing the shirt -->
  <path d="M78 18 L40 27 L33 45 L52 98 L86 74 Z" fill="url(#satin)" stroke="#08080c" stroke-width="1.4"/>
  <path d="M112 18 L150 27 L157 45 L138 98 L104 74 Z" fill="url(#satin)" stroke="#08080c" stroke-width="1.4"/>
  <!-- lapel roll highlight -->
  <path d="M78 20 L44 29" stroke="#6e6e78" stroke-width="1.2" opacity="0.7"/>
  <path d="M112 20 L146 29" stroke="#6e6e78" stroke-width="1.2" opacity="0.7"/>

  <!-- Bow tie -->
  <path d="M84 30 L70 22 L70 40 Z" fill="#111117" stroke="#000000" stroke-width="1"/>
  <path d="M106 30 L120 22 L120 40 Z" fill="#111117" stroke="#000000" stroke-width="1"/>
  <rect x="90" y="26" width="10" height="9" rx="2" fill="#1b1b22"/>

  <!-- Pocket square (peaks from the breast pocket) -->
  <path d="M120 70 L136 70 L128 80 Z" fill="#f4f1ea" stroke="#c3bcac" stroke-width="0.8"/>

  <!-- Waist button + fold highlights -->
  <circle cx="95" cy="120" r="3" fill="#3a3a42" stroke="#0a0a0e" stroke-width="0.8"/>
  <path d="M46 60 Q40 100 44 130" fill="none" stroke="#4a4a54" stroke-width="1.4" opacity="0.55"/>
  <path d="M144 60 Q150 100 146 130" fill="none" stroke="#4a4a54" stroke-width="1.4" opacity="0.55"/>
  <path d="M60 40 Q56 90 62 132" fill="none" stroke="#000000" stroke-width="1" opacity="0.35"/>
  <path d="M130 40 Q134 90 128 132" fill="none" stroke="#000000" stroke-width="1" opacity="0.35"/>
</svg>
