<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 84 340" width="84" height="340">
  <defs>
    <linearGradient id="sleeveR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#08080e"/>
      <stop offset="55%" stop-color="#2b2b34"/>
      <stop offset="100%" stop-color="#05050a"/>
    </linearGradient>
    <radialGradient id="handR" cx="40%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#e7ded2"/>
      <stop offset="100%" stop-color="#c3b6a2"/>
    </radialGradient>
    <linearGradient id="caneShaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0c0c10"/>
      <stop offset="45%" stop-color="#3a3630"/>
      <stop offset="100%" stop-color="#0c0c10"/>
    </linearGradient>
    <radialGradient id="knob" cx="38%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#eef0f4"/>
      <stop offset="60%" stop-color="#b9bcc4"/>
      <stop offset="100%" stop-color="#7c7f88"/>
    </radialGradient>
  </defs>
  <!-- Cane (drawn first, behind the hand so the hand grips the knob) -->
  <rect x="37" y="182" width="7" height="150" rx="2" fill="url(#caneShaft)" stroke="#050508" stroke-width="1"/>
  <rect x="35" y="330" width="11" height="6" rx="1.5" fill="url(#knob)" stroke="#4a4a52" stroke-width="0.8"/>
  <ellipse cx="40.5" cy="180" rx="8.5" ry="7.5" fill="url(#knob)" stroke="#4a4a52" stroke-width="1"/>

  <!-- Sleeve -->
  <path d="M18 10 Q40 3 62 10 L58 96 Q56 140 52 164 L26 164 Q23 140 20 96 Z"
        fill="url(#sleeveR)" stroke="#050508" stroke-width="1.5"/>
  <path d="M46 20 Q48 90 46 160" fill="none" stroke="#43434d" stroke-width="1.2" opacity="0.5"/>
  <!-- White shirt cuff -->
  <path d="M26 161 L52 161 L51 168 L27 168 Z" fill="#efece3" stroke="#bcb5a4" stroke-width="0.8"/>
  <!-- Hand gripping the knob (fist) -->
  <path d="M29 164 Q25 175 29 186 Q37 191 48 187 Q53 181 51 171 Q50 165 45 164 Z"
        fill="url(#handR)" stroke="#5a4f40" stroke-width="1.1"/>
  <path d="M32 174 L48 174 M33 180 L47 180" stroke="#8a7c66" stroke-width="0.8" opacity="0.55"/>
</svg>
