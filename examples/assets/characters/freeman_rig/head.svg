<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" width="160" height="200">
  <defs>
    <filter id="ink" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="1" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#ink)">
    <!-- thin neck into the collar (behind the mask) -->
    <path d="M66 158 L64 190 L96 190 L94 158 Z" fill="#0e0e0e"/>
    <!-- egg mask: thin outline on top, heavy brush weight on the bottom/shadow
         side (fakes a calligraphic thick-thin ink stroke) -->
    <path d="M80 6 Q128 12 130 84 Q130 146 100 172 Q88 182 80 182 Q72 182 60 172 Q30 146 30 84 Q32 12 80 6 Z"
          fill="#eef1ec" stroke="#0e0e0e" stroke-width="3"/>
    <path d="M31 96 Q34 150 62 174 Q73 182 80 182 Q88 182 99 174 Q126 152 129 98"
          fill="none" stroke="#0e0e0e" stroke-width="7.5" stroke-linecap="round"/>
    <path d="M30 78 Q31 60 36 44" fill="none" stroke="#0e0e0e" stroke-width="5.5" stroke-linecap="round"/>
    <!-- faint inked cheek lines -->
    <path d="M112 70 Q120 104 104 146" fill="none" stroke="#c2c7c0" stroke-width="1.6" opacity="0.8"/>
    <path d="M58 150 Q70 158 82 160" fill="none" stroke="#c2c7c0" stroke-width="1.4" opacity="0.7"/>
  </g>
</svg>
