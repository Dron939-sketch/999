<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" width="160" height="200">
  <defs>
    <filter id="ink" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#ink)">
    <!-- thin neck into the collar (behind the mask) -->
    <path d="M66 158 L64 190 L96 190 L94 158 Z" fill="#0e0e0e"/>
    <!-- egg mask -->
    <path d="M80 6 Q128 12 130 84 Q130 146 100 172 Q88 182 80 182 Q72 182 60 172 Q30 146 30 84 Q32 12 80 6 Z"
          fill="#eef1ec" stroke="#0e0e0e" stroke-width="2.6"/>
    <!-- faint inked cheek lines -->
    <path d="M112 70 Q120 104 104 146" fill="none" stroke="#c2c7c0" stroke-width="1.6" opacity="0.8"/>
    <path d="M58 150 Q70 158 82 160" fill="none" stroke="#c2c7c0" stroke-width="1.4" opacity="0.7"/>
  </g>
</svg>
