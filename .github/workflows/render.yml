name: Render Videos

on:
  push:
    branches:
      - main
      - master
  # Ручной запуск на любой ветке: Actions → Render Videos → Run workflow
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Rust cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Build engine
        run: cargo build --release

      - name: Render videos
        run: |
          mkdir -p videos
          # список: "источник.anim -> videos/имя.mp4"
          RENDERS=(
            "examples/lektorij/pereproshivka-intro.anim videos/pereproshivka-intro.mp4"
            "examples/freeman-monologue.anim videos/freeman-monologue.mp4"
            "examples/lektorij/fredi-expressions-demo.anim videos/fredi-expressions.mp4"
            "examples/lektorij/lekciya-2-frejd-psihodinamika.anim videos/lekciya-2-frejd.mp4"
          )
          for pair in "${RENDERS[@]}"; do
            src="${pair% *}"; dst="${pair#* }"
            echo "=== render: $src -> $dst"
            ./target/release/animdsl render "$src" -o "$dst"
          done
          ls -la videos/

      - name: Commit videos to the repo
        run: |
          git config user.name "render-bot"
          git config user.email "actions@github.com"
          git add videos/*.mp4
          if git diff --cached --quiet; then
            echo "Видео не изменились — коммит не нужен."
            exit 0
          fi
          git commit -m "CI: обновлены готовые видео в videos/ [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
