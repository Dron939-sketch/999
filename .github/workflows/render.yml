name: Render Videos

on:
  push:
    branches:
      - main
      - master
  # Ручной запуск на любой ветке: Actions → Render Videos → Run workflow
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Rust cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Build engine
        run: cargo build --release

      - name: Render videos
        run: |
          mkdir -p videos
          # список: "источник.anim -> videos/имя.mp4"
          RENDERS=(
            "examples/lektorij/pereproshivka-intro.anim videos/pereproshivka-intro.mp4"
            "examples/freeman-monologue.anim videos/freeman-monologue.mp4"
            "examples/lektorij/fredi-expressions-demo.anim videos/fredi-expressions.mp4"
            "examples/lektorij/lekciya-2-frejd-psihodinamika.anim videos/lekciya-2-frejd.mp4"
          )
          for pair in "${RENDERS[@]}"; do
            src="${pair% *}"; dst="${pair#* }"
            echo "=== render: $src -> $dst"
            ./target/release/animdsl render "$src" -o "$dst"
          done
          ls -la videos/

      - name: Generate voiceover (Fish Audio) + final mux
        env:
          FISH_AUDIO_API_KEY: ${{ secrets.FISH_AUDIO_API_KEY }}
          FISH_AUDIO_VOICE_ID: ${{ secrets.FISH_AUDIO_VOICE_ID }}
        run: |
          if [ -z "$FISH_AUDIO_API_KEY" ]; then
            echo "Секрет FISH_AUDIO_API_KEY не задан — шаг озвучки пропущен."
            echo "Добавьте его: Settings → Secrets and variables → Actions."
            exit 0
          fi
          # озвучка: "VO-сценарий -> videos/имя-voice.mp3 (+ финальный mp4)"
          DUBS=(
            "examples/lektorij/pereproshivka-intro-VO.md videos/pereproshivka-intro"
          )
          chmod +x tools/compose_video.sh
          for pair in "${DUBS[@]}"; do
            vo="${pair% *}"; base="${pair#* }"
            echo "=== voice: $vo -> ${base}-voice.mp3"
            python3 tools/voiceover.py "$vo" -o "${base}-voice.mp3"
            if [ -f "${base}.mp4" ]; then
              echo "=== mux: ${base}-final.mp4"
              tools/compose_video.sh "${base}.mp4" "${base}-voice.mp3" "${base}-final.mp4"
            fi
          done
          ls -la videos/

      - name: Commit videos to the repo
        run: |
          git config user.name "render-bot"
          git config user.email "actions@github.com"
          git add videos/*.mp4 videos/*.mp3 2>/dev/null || git add videos/*.mp4
          if git diff --cached --quiet; then
            echo "Видео не изменились — коммит не нужен."
            exit 0
          fi
          git commit -m "CI: обновлены готовые видео и озвучка в videos/ [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
